# Rose Pine Theme Colors
# Base: #191724, Surface: #1f1d2e, Overlay: #26233a, Muted: #6e6a86, Subtle: #908caa, Text: #e0def4
# Love: #eb6f92, Gold: #f6c177, Rose: #ebbcba, Pine: #31748f, Foam: #9ccfd8, Iris: #c4a7e7

# --- Monitor ---
monitor=,preferred,auto,auto

# --- Execute at launch ---
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = true
    }
}

# --- General ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(c4a7e7ee) rgba(ebbcbaee) 45deg # Iris to Rose
    col.inactive_border = rgba(191724aa)
    layout = dwindle
}

# --- Decoration ---
decoration {
    rounding = 10
    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- Animations ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- Layouts ---
dwindle {
    pseudotile = true
    preserve_split = true
}

# --- Master ---
master {
    new_status = master
}

# --- Gestures ---
gestures {
    workspace_swipe = true
}

# --- Keybindings ---
$mainMod = SUPER

# Applications
bind = $mainMod, RETURN, exec, ghostty || kitty || alacritty
bind = $mainMod, SPACE, exec, wofi --show drun
bind = $mainMod, B, exec, brave || firefox || chromium
bind = $mainMod, N, exec, nvim
bind = $mainMod, E, exec, yazi

# Window Management
bind = $mainMod, W, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen,

# Focus (Vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# Workspace Management (similar to AeroSpace alt-tab)
bind = $mainMod, TAB, workspace, previous

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Window Rules ---
windowrulev2 = workspace 1, class:^(Brave-browser)$
windowrulev2 = workspace 2, class:^(com.mitchellh.ghostty)$
windowrulev2 = workspace 3, class:^(obsidian)$
windowrulev2 = workspace 4, class:^(Microsoft Teams)$
